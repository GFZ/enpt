# This environment is used to test certain versions of EnPT requirements within the EnMAP-Box environment.

name: enpt

channels: &id1
  - conda-forge

dependencies:
  - python>3.12
  - pip  # avoids that conda uses the wrong pip
  - acwater>=0.4.1
  - arosics>1.0.0
  - cerberus
  - gdal
  - geoarray>=0.19.2
  - isofit=3.4.3  # compatibility for >=3.5 not yet implemented
  - jsmin
  - lxml
  - matplotlib
  - mvgavg
  - natsort
  - numpy
  - numpy-indexed
  - packaging
  - pandas
  - pyproj>=3.4.0
  - py-tools-ds>=0.14.25
  - scikit-image
  - scipy
  - sensormapgeo>=1.0.0
  - sicor>=0.19.1
  - tqdm
  - utm

  # EnMAP-Box
  - astropy
  - catboost
  - enfrosp_enmapboxapp
  - h5py
  - lightgbm
  - lightning
  - matplotlib
  - netcdf4
  - numba>=0.63
  - numpy
  - opencv
  - pandas=2.2.3
  - pyopengl
  - pytorch
  - qgis>=3.42.2
  - scikit-learn>=1
  - segmentation-models-pytorch
  - sympy
  - tensorboard
  - torchvision
  - xgboost

  # test/doc/lint requirements
  - flake8
  - pycodestyle
  - pydocstyle
  - pylint
  - pytest
  - pytest-cov
  - sphinx-argparse
  # - sphinx_rtd_theme  # pinnings out of sync - https://github.com/conda-forge/sphinx_rtd_theme-feedstock/pull/41
  - urlchecker

  - pip:
    - flake8-qgis
    - sphinx_rtd_theme
    - pytest-reporter-html1>=0.9.5  # 0.9.4 misses constraint for docutils>=0.22
