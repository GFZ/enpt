name: enpt_full

channels: &id1
  - conda-forge

dependencies:
  - python>=3.10
  - pip  # avoids that conda uses the wrong pip
  - enpt>=1.2.1
  - enpt_enmapboxapp>=1.0.2

  # EnMAP-Box
  - astropy
  - catboost
  - enfrosp_enmapboxapp
  - h5py
  - lightgbm
  - lightning
  - matplotlib
  - netcdf4
  - numba>=0.63
  - numpy
  - opencv
  - pandas=2.2.3
  - pyopengl
  - pytorch
  - qgis>=3.42.2
  - scikit-learn>=1
  - segmentation-models-pytorch
  - sympy
  - tensorboard
  - torchvision
  - xgboost

  # test/doc/lint requirements
  - flake8
  - pycodestyle
  - pydocstyle
  - pylint
  - pytest
  - pytest-cov
  - sphinx-argparse
  # - sphinx_rtd_theme  # pinnings out of sync - https://github.com/conda-forge/sphinx_rtd_theme-feedstock/pull/41
  - urlchecker

  - pip:
    - sphinx_rtd_theme
    - pytest-reporter-html1>=0.9.5  # 0.9.4 misses constraint for docutils>=0.22
