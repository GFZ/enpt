name: enpt_full

channels: &id1
  - conda-forge

dependencies:
  - python>=3.10
  - pip  # avoids that conda uses the wrong pip
  - enpt>=1.2.1
  - enpt_enmapboxapp>=1.0.2

  # EnMAP-Box
  - astropy
  - catboost
  - enfrosp_enmapboxapp
  - h5py
  - lightgbm
  - lightning
  - matplotlib
  - netcdf4
  - numba>=0.63
  - numpy
  - opencv
  - pandas
  - pyopengl
  - pytorch
  - qgis>=3.42.2
  - scikit-learn>=1
  - segmentation-models-pytorch
  - sympy
  - tensorboard
  - torchvision
  - xgboost
